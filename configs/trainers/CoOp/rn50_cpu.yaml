DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 8 # Reduced from 32 for CPU memory
  TEST:
    BATCH_SIZE: 32
  NUM_WORKERS: 0 # No parallel data loading on CPU

INPUT:
  SIZE: (224, 224)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]

OPTIM:
  NAME: "sgd"
  LR: 0.002
  MAX_EPOCH: 10 # Reduced from 50 for faster testing
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 1
  WARMUP_TYPE: "constant"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 5

MODEL:
  BACKBONE:
    NAME: "RN50"

TRAINER:
  NAME: CoOpGraph
  COOP:
    N_CTX: 16
    CSC: False
    CLASS_TOKEN_POSITION: end
    PREC: "fp32" # CPU-compatible precision
    # ── Graph modification hyperparameters ──
    GRAPH_THRESHOLD: 0.3 # cosine similarity cutoff for edges
    ALPHA_SMOOTH: 0.1 # label smoothing strength (0 = off)
    LAMBDA_LAP: 0.01 # Laplacian regularization weight (0 = off)
    USE_GCN: False # toggle GCN on/off
